<!DOCTYPE html>
<html>
<head>
    <title>Cafetería</title>
    <style>
        .producto { display: inline-block; margin: 20px; text-align: center; border: 1px solid #ccc; padding: 10px; }
        img { width: 200px; height: 150px; object-fit: cover; }
        .btn-add { background-color: #00ff00; border: 2px solid black; padding: 10px; cursor: pointer; }
        .btn-buy { background-color: #008000; color: white; padding: 15px 40px; font-size: 1.2em; }
    </style>
</head>
<body>
    <form action="/comprar" method="post">
        {% for id, p in productos.items() %}
        <div class="producto">
            <h3>{{ p.nombre }}</h3>
            <img src="{{ url_for('static', filename=p.imagen) }}">
            <br><br>
            <input type="number" name="cant_{{ id }}" value="0" min="0">
            <br><br>
            <div class="btn-add">añadir al carrito</div>
        </div>
        {% endfor %}
        <br><br>
        <button type="submit" class="btn-buy">comprar</button>
    </form>
</body>
</html>
