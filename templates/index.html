<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tienda de Productos</title>
    <style>
        body { font-family: Arial, sans-serif; display: flex; flex-direction: column; align-items: center; background-color: #f4f4f4; }
        .contenedor { display: flex; gap: 20px; margin-top: 50px; }
        .producto { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); text-align: center; width: 200px; }
        .producto img { width: 150px; height: 150px; object-fit: cover; border-radius: 5px; }
        h2 { font-size: 1.2em; margin: 10px 0; }
        button { background-color: #28a745; color: white; border: none; padding: 10px; border-radius: 5px; cursor: pointer; }
        button:hover { background-color: #218838; }
        .btn-comprar { margin-top: 30px; background-color: #007bff; padding: 15px 30px; font-size: 1.1em; }
    </style>
</head>
<body>

    <h1>Mi Tienda Simple</h1>

    <div class="contenedor">
        <!-- Producto 1: Lácteos -->
        <div class="producto">
            <img src="{{ url_for('static', filename='leche_shabo.jpg') }}" alt="Leche Shabo">
            <h2>Leche Shabo</h2>
            <p>Categoría: Lacteos</p>
            <button>Agregar al carrito</button>
        </div>

        <!-- Producto 2: Pan -->
        <div class="producto">
            <img src="{{ url_for('static', filename='bolillo_minecraft.jpg') }}" alt="Bolillo de Minecraft">
            <h2>Bolillo de Minecraft</h2>
            <p>Categoría: Pan</p>
            <button>Agregar al carrito</button>
        </div>

        <!-- Producto 3: Frutas -->
        <div class="producto">
            <img src="{{ url_for('static', filename='banana.jpg') }}" alt="Banana">
            <h2>Banana</h2>
            <p>Categoría: Frutas</p>
            <button>Agregar al carrito</button>
        </div>
    </div>

    <!-- Botón para ir a la página de pago -->
    <form action="/checkout" method="get">
        <button type="submit" class="btn-comprar">Comprar ahora</button>
    </form>

</body>
</html>
