<!DOCTYPE html>
<html>
<head>
    <title>Resumen de Compra</title>
</head>
<body>
    <h1>Precios compra</h1>
    <ul>
        {% for item in items %}
        <li>1 {{ item.nombre }} - ${{ item.precio }}</li>
        {% endfor %}
    </ul>
    <hr>
    <p>Descuento: ${{ resumen.descuento }}</p>
    <p>SUBTOTAL: ${{ resumen.subtotal }}</p>
    <p>IVA: ${{ resumen.iva }}</p>
    <h2>Total: ${{ resumen.total }}</h2>
    <a href="/">Regresar</a>
</body>
</html>
